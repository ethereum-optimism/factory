name: Container Build (Reusable)
# Supports docker build, docker bake, ko, and apko build modes

on:
  workflow_call:
    inputs:
      # === Common inputs ===
      mode:
        description: 'Build mode: "build" for Dockerfile, "bake" for docker-bake.hcl, "ko" for Go static binaries, "apko" for declarative apko+melange+Wolfi'
        required: false
        type: string
        default: 'build'
      registry:
        description: 'Container registry URL (e.g., us-docker.pkg.dev/project/repo)'
        required: true
        type: string
      image_name:
        description: 'Image name (e.g., gateway-backend)'
        required: true
        type: string
      target:
        description: 'Docker build target (for multi-stage Dockerfiles) or bake target'
        required: false
        type: string
        default: ''
      gcp_project_id:
        description: 'GCP Project ID'
        required: false
        type: string
      tag:
        description: 'Docker tag for the final image'
        required: false
        type: string
        default: ${{ github.ref_name }}
      skip_arm64:
        description: 'Skip ARM64 builds (build amd64 only)'
        required: false
        type: boolean
        default: false
      env:
        description: 'Environment variables to set before build (KEY=VALUE format, one per line)'
        required: false
        type: string
        default: ''
      sbom:
        description: 'Generate SBOM attestation for the build'
        required: false
        type: boolean
        default: true

      # === Source repository inputs ===
      source_repo:
        description: 'Source repository to build from (format: owner/repo). Defaults to github.repository (the calling workflow repository).'
        required: false
        type: string
        default: ''
      source_ref:
        description: 'Git ref (branch, tag, SHA) to checkout. Defaults to github.sha (the commit that triggered the workflow).'
        required: false
        type: string
        default: ''

      # === Build mode inputs ===
      context:
        description: '[build mode] Build context path'
        required: false
        default: '.'
        type: string
      dockerfile:
        description: '[build mode] Path to Dockerfile relative to context'
        required: false
        type: string
        default: 'Dockerfile'
      build_args:
        description: '[build mode] Build arguments as multiline string (KEY=VALUE format, one per line)'
        required: false
        type: string
        default: ''

      # === Bake mode inputs ===
      bake_file:
        description: '[bake mode] Path to docker-bake.hcl or docker-compose.yml file'
        required: false
        type: string
        default: 'docker-bake.hcl'
      set:
        description: '[bake mode] Variables to set (KEY=VALUE format, one per line)'
        required: false
        type: string
        default: ''

      # === Ko mode inputs ===
      ko_working_directory:
        description: '[ko mode] Directory containing go.mod and .ko.yaml'
        required: false
        type: string
        default: '.'
      ko_importpath:
        description: '[ko mode] Go import path to build (e.g., ./cmd)'
        required: false
        type: string
        default: './cmd'
      ko_go_version_file:
        description: '[ko mode] Path to go.mod for setup-go (relative to repo root). Defaults to {ko_working_directory}/go.mod'
        required: false
        type: string
        default: ''

      # === Apko mode inputs ===
      apko_config:
        description: '[apko mode] Path to the apko config file, relative to repo root (e.g., op-host-manager/apko/apko.yaml)'
        required: false
        type: string
        default: ''
      melange_configs:
        description: '[apko mode] Comma-separated list of melange config paths. Relative to `melange_workdir` when it is set, otherwise to the repo root. Empty if the image uses only upstream Wolfi packages.'
        required: false
        type: string
        default: ''
      melange_workdir:
        description: '[apko mode] Subdirectory that melange should treat as the source root, i.e. the directory containing `go.mod` or otherwise matching how the melange pipeline resolves paths. Defaults to the repo root. Set this to a subdirectory (e.g. `op-host-manager`) for services that live under a subpath.'
        required: false
        type: string
        default: ''

    secrets:
      source_token:
        description: 'Token for accessing source_repo when it is a private repository'
        required: false

jobs:
  safety-checklist:
    runs-on: ubuntu-latest
    outputs:
      sanitized_tag: ${{ steps.sanitize.outputs.sanitized_tag }}
      is_fork_pr: ${{ steps.fork-check.outputs.is_fork_pr }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Sanitize tag
        id: sanitize
        run: echo "sanitized_tag=$(echo ${{ inputs.tag }} | sed 's/[^a-zA-Z0-9.]/-/g')" >> $GITHUB_OUTPUT
      - name: Check if we are in a fork PR
        id: fork-check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "is_fork_pr=true" >> $GITHUB_OUTPUT
          else
            echo "is_fork_pr=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: safety-checklist
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJSON(inputs.skip_arm64 && '[{"platform":"linux/amd64","runner":"ubuntu-latest","apko_arch":"amd64","melange_arch":"x86_64"}]' || '[{"platform":"linux/amd64","runner":"ubuntu-latest","apko_arch":"amd64","melange_arch":"x86_64"},{"platform":"linux/arm64","runner":"ubuntu-24.04-arm","apko_arch":"arm64","melange_arch":"aarch64"}]') }}
    runs-on: ${{ matrix.runner }}
    
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout source repository
        uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e # v4
        with:
          repository: ${{ inputs.source_repo || github.repository }}
          ref: ${{ inputs.source_ref || github.sha }}
          token: ${{ secrets.source_token || github.token }}
          submodules: recursive

      - name: Set up Docker Buildx
        if: inputs.mode == 'build' || inputs.mode == 'bake'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Setup Go
        if: inputs.mode == 'ko'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: ${{ inputs.ko_go_version_file || format('{0}/go.mod', inputs.ko_working_directory) }}
          cache-dependency-path: ${{ inputs.ko_working_directory }}/go.sum

      - name: Setup ko
        if: inputs.mode == 'ko'
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9
        env:
          KO_DOCKER_REPO: ${{ inputs.registry }}/${{ inputs.image_name }}

      # === Apko mode setup ===
      # The melange steps only run when the image ships local packages. Images
      # that use only upstream Wolfi packages skip straight to apko publish.
      - name: Setup melange
        if: inputs.mode == 'apko' && inputs.melange_configs != ''
        uses: chainguard-dev/actions/setup-melange@d3355cdd09c93e0d17b486406387cbb162a05134 # v1.6.15

      - name: Generate ephemeral melange signing key
        if: inputs.mode == 'apko' && inputs.melange_configs != ''
        uses: chainguard-dev/actions/melange-keygen@d3355cdd09c93e0d17b486406387cbb162a05134 # v1.6.15
        with:
          signing-key-path: ${{ github.workspace }}/melange.rsa

      - name: Build melange packages
        if: inputs.mode == 'apko' && inputs.melange_configs != ''
        uses: chainguard-dev/actions/melange-build-pkg@d3355cdd09c93e0d17b486406387cbb162a05134 # v1.6.15
        with:
          multi-config: ${{ inputs.melange_configs }}
          archs: ${{ matrix.melange_arch }}
          sign-with-key: 'true'
          signing-key-path: ${{ github.workspace }}/melange.rsa
          repository-path: ${{ github.workspace }}/packages
          source-dir: ${{ github.workspace }}
          workdir: ${{ inputs.melange_workdir }}

      - name: Authenticate to Google Cloud
        if: needs.safety-checklist.outputs.is_fork_pr == 'false' && inputs.gcp_project_id != ''
        id: auth
        uses: google-github-actions/auth@fc2174804b84f912b1f6d334e9463f484f1c552d # v3
        with:
          project_id: ${{ inputs.gcp_project_id }}
          workload_identity_provider: projects/${{ inputs.gcp_project_id }}/locations/global/workloadIdentityPools/github/providers/github-oidc
          create_credentials_file: true

      - name: Configure Docker for GCP Artifact Registry
        if: needs.safety-checklist.outputs.is_fork_pr == 'false' && inputs.gcp_project_id != ''
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Login to GCP Artifact Registry
        if: needs.safety-checklist.outputs.is_fork_pr == 'false' && inputs.gcp_project_id != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ inputs.registry }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}

      - name: Set environment variables
        if: inputs.env != ''
        run: |
          cat >> $GITHUB_ENV << 'EOF'
          ${{ inputs.env }}
          EOF

      # === Build mode ===
      - name: Build image (build mode)
        if: inputs.mode == 'build'
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: "{{defaultContext}}:${{ inputs.context }}"
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.target }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: mode=max
          sbom: ${{ inputs.sbom }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha,scope=${{ inputs.image_name }}-${{ matrix.platform }}
          cache-to: ${{ github.ref_protected && format('type=gha,mode=max,scope={0}-{1}', inputs.image_name, matrix.platform) || '' }}
          outputs: type=image,push-by-digest=true,name-canonical=true,name=${{ inputs.registry }}/${{ inputs.image_name }},push=true

      # === Bake mode ===
      - name: Build image (bake mode)
        if: inputs.mode == 'bake'
        id: bake
        env:
          PLATFORMS: ${{ matrix.platform }}
        uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7
        with:
          source: .
          targets: ${{ inputs.target }}
          push: true
          files: ${{ inputs.bake_file }}
          provenance: mode=max
          sbom: ${{ inputs.sbom }}
          set: |
            *.tags=
            *.cache-from=type=gha,scope=${{ inputs.image_name }}-${{ matrix.platform }}
            *.cache-to=${{ github.ref_protected && format('type=gha,mode=max,scope=${{ inputs.image_name }}-${{ matrix.platform }}') || '' }}
            *.output=type=image,push-by-digest=true,name-canonical=true,name=${{ inputs.registry }}/${{ inputs.image_name }},push=true
            ${{ inputs.set }}

      # === Ko mode ===
      - name: Build image (ko mode)
        if: inputs.mode == 'ko'
        id: ko
        working-directory: ${{ inputs.ko_working_directory }}
        env:
          KO_DOCKER_REPO: ${{ inputs.registry }}/${{ inputs.image_name }}
          KO_CONFIG_PATH: ${{ github.workspace }}
        run: |
          PLATFORM="${{ matrix.platform }}"
          PLATFORM_SUFFIX="${PLATFORM//\//-}"
          image=$(ko build \
            --bare \
            --sbom=${{ inputs.sbom && 'spdx' || 'none' }} \
            --platform=${{ matrix.platform }} \
            -t "build-${PLATFORM_SUFFIX}-${{ github.sha }}" \
            ${{ inputs.ko_importpath }})
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "digest=${image##*@}" >> "$GITHUB_OUTPUT"
          echo "Built (${{ matrix.platform }}): $image"

      # === Apko mode ===
      - name: Get Artifact Registry access token (apko mode)
        if: inputs.mode == 'apko' && needs.safety-checklist.outputs.is_fork_pr == 'false' && inputs.gcp_project_id != ''
        id: ar-token
        run: echo "token=$(gcloud auth print-access-token)" >> "$GITHUB_OUTPUT"

      - name: Build and publish image (apko mode)
        if: inputs.mode == 'apko'
        id: apko
        uses: chainguard-images/actions/apko-publish@8c944db3b6ddf03e393f894724815fc3ac3572f2 # v1.0.24
        with:
          config: ${{ inputs.apko_config }}
          tag: ${{ inputs.registry }}/${{ inputs.image_name }}:build-${{ matrix.apko_arch }}-${{ github.sha }}
          archs: ${{ matrix.apko_arch }}
          generic-user: oauth2accesstoken
          generic-pass: ${{ steps.ar-token.outputs.token }}

      # apko-publish's digest output is the full pushed image reference
      # (registry/name@sha256:xxx). Strip to a bare digest so it plugs into
      # the shared Extract digest / merge pipeline alongside the other modes.
      - name: Extract apko image digest
        if: inputs.mode == 'apko'
        id: apko-digest
        run: |
          REF='${{ steps.apko.outputs.digest }}'
          DIGEST="${REF##*@}"
          if [[ "$DIGEST" != sha256:* ]]; then
            echo "::error::apko-publish did not return a usable digest; got: $REF"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # === Extract digest ===
      - name: Extract digest
        run: |
          OUTPUT_FILE="/tmp/${{ inputs.image_name }}-${{ github.sha }}-${{ strategy.job-index }}.txt"

          if [[ "${{ inputs.mode }}" == "build" ]]; then
            cat <<'DIGEST_EOF' > "$OUTPUT_FILE"
          ${{ steps.build.outputs.digest }}
          DIGEST_EOF
          elif [[ "${{ inputs.mode }}" == "bake" ]]; then
            METADATA_FILE="${OUTPUT_FILE%.txt}-metadata.json"
            cat <<'METADATA_EOF' > "$METADATA_FILE"
          ${{ steps.bake.outputs.metadata }}
          METADATA_EOF
            jq -r '.["${{ inputs.target }}"]["containerimage.digest"]' "$METADATA_FILE" > "$OUTPUT_FILE"
          elif [[ "${{ inputs.mode }}" == "ko" ]]; then
            echo "${{ steps.ko.outputs.digest }}" > "$OUTPUT_FILE"
          elif [[ "${{ inputs.mode }}" == "apko" ]]; then
            echo "${{ steps.apko-digest.outputs.digest }}" > "$OUTPUT_FILE"
          fi

          echo "Extracted digest: $(cat $OUTPUT_FILE)"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.image_name }}-${{ github.sha }}-${{ strategy.job-index }}
          path: /tmp/${{ inputs.image_name }}-${{ github.sha }}-${{ strategy.job-index }}.txt
          if-no-files-found: error
          retention-days: 1
      
  merge:
    name: merge multi-arch manifest
    needs: [safety-checklist, build]
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.merge.outputs.digest }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Authenticate to Google Cloud
        if: needs.safety-checklist.outputs.is_fork_pr == 'false' && inputs.gcp_project_id != ''
        id: auth
        uses: google-github-actions/auth@fc2174804b84f912b1f6d334e9463f484f1c552d # v3
        with:
          project_id: ${{ inputs.gcp_project_id }}
          workload_identity_provider: projects/${{ inputs.gcp_project_id }}/locations/global/workloadIdentityPools/github/providers/github-oidc

      - name: Login to GCP Artifact Registry
        if: needs.safety-checklist.outputs.is_fork_pr == 'false' && inputs.gcp_project_id != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ inputs.registry }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: ${{ inputs.image_name }}-${{ github.sha }}-*
          merge-multiple: true

      - name: Create multi-arch manifest
        id: merge
        run: |
          IMAGE_NAME="${{ inputs.registry }}/${{ inputs.image_name }}"
          
          # Read digests from text files and build full references
          digest_refs=""
          for digest_file in /tmp/digests/*.txt; do
            digest=$(cat "$digest_file")
            digest_refs="$digest_refs ${IMAGE_NAME}@$digest"
          done
          
          # Create manifest from digests
          docker buildx imagetools create \
            -t ${IMAGE_NAME}:${{ github.sha }} \
            -t ${IMAGE_NAME}:${{ needs.safety-checklist.outputs.sanitized_tag }} \
            $digest_refs
          
          # Get the multi-arch manifest digest
          inspect_output=$(docker buildx imagetools inspect ${IMAGE_NAME}:${{ github.sha }})
          manifest_digest=$(echo "$inspect_output" | grep 'Digest:' | head -1 | awk '{print $2}')
          echo "digest=$manifest_digest" >> $GITHUB_OUTPUT
          
          # Extract platform info for summary
          platforms=$(echo "$inspect_output" | grep -E 'Platform:' | awk '{print $2}' | tr '\n' ', ' | sed 's/,$//')
          
          # Generate GitHub Actions summary
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🐳 Multi-arch Manifest
          
          | | |
          |---|---|
          | **Image** | \`${IMAGE_NAME}\` |
          | **Digest** | \`${manifest_digest}\` |
          | **Platforms** | ${platforms} |
          
          ### Tags
          - \`${{ github.sha }}\`
          - \`${{ needs.safety-checklist.outputs.sanitized_tag }}\`
          EOF

  attest:
    name: attest build provenance
    needs: [safety-checklist, merge]
    if: needs.safety-checklist.outputs.is_fork_pr == 'false' && inputs.gcp_project_id != ''
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@fc2174804b84f912b1f6d334e9463f484f1c552d # v3
        with:
          project_id: ${{ inputs.gcp_project_id }}
          workload_identity_provider: projects/${{ inputs.gcp_project_id }}/locations/global/workloadIdentityPools/github/providers/github-oidc

      - name: Login to GCP Artifact Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ inputs.registry }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ${{ inputs.registry }}/${{ inputs.image_name }}
          subject-digest: ${{ needs.merge.outputs.digest }}
          push-to-registry: true
